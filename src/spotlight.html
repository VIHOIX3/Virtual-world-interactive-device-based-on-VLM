<!DOCTYPE html>
<html lang="en">
<head>
  <title>three.js webgl - lights - spotlight</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  <link type="text/css" rel="stylesheet" href="main.css">
</head>
<body>

<div id="info">
  <a href="https://threejs.org" target="_blank" rel="noopener">three.js</a> webgl - spotlight<br />
</div>

<script type="importmap">
  {
    "imports": {
      "three": "../build/three.module.js",
      "three/addons/": "./jsm/"
    }
  }
</script>

<script type="module">

  import * as THREE from 'three';

  import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

  import { PLYLoader } from 'three/addons/loaders/PLYLoader.js';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import {MTLLoader} from "three/addons/loaders/MTLLoader.js";
  import {OBJLoader} from "three/addons/loaders/OBJLoader.js";

  let renderer, scene, camera;

  let spotLight, lightHelper;
  let cube
  init();

  function init() {

    renderer = new THREE.WebGLRenderer( { antialias: true } );
    renderer.setPixelRatio( window.devicePixelRatio );
    renderer.setSize( window.innerWidth, window.innerHeight );
    renderer.setAnimationLoop( animate );
    document.body.appendChild( renderer.domElement );

    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1;

    scene = new THREE.Scene();

    camera = new THREE.PerspectiveCamera( 40, window.innerWidth / window.innerHeight, 0.1, 100 );
    camera.position.set( 7, 4, 1 );

    const controls = new OrbitControls( camera, renderer.domElement );
    controls.minDistance = 2;
    controls.maxDistance = 10;
    controls.maxPolarAngle = Math.PI / 2;
    controls.target.set( 0, 1, 0 );
    controls.update();

    const ambient = new THREE.HemisphereLight( 0xffffff, 0x8d8d8d, 0.15 );
    scene.add( ambient );

    const loader = new THREE.TextureLoader();
    const filenames = [ 'disturb.jpg', './src/three.js-master/examples/textures/colors.png', './src/three.js-master/examples/textures/uv_grid_opengl.jpg' ];

    const textures = { none: null };

    for ( let i = 0; i < filenames.length; i ++ ) {

      const filename = filenames[ i ];

      const texture = loader.load( filename );
      texture.minFilter = THREE.LinearFilter;
      texture.magFilter = THREE.LinearFilter;
      texture.generateMipmaps = false;
      texture.colorSpace = THREE.SRGBColorSpace;

      textures[ filename ] = texture;

    }

    spotLight = new THREE.SpotLight( 0xffffff, 100 );
    spotLight.position.set( 2.5, 5, 2.5 );
    spotLight.angle = Math.PI / 6;
    spotLight.penumbra = 1;
    spotLight.decay = 2;
    spotLight.distance = 0;
    spotLight.map = textures[ 'disturb.jpg' ];

    spotLight.castShadow = true;
    spotLight.shadow.mapSize.width = 1024;
    spotLight.shadow.mapSize.height = 1024;
    spotLight.shadow.camera.near = 1;
    spotLight.shadow.camera.far = 10;
    spotLight.shadow.focus = 1;
    scene.add( spotLight );

    lightHelper = new THREE.SpotLightHelper( spotLight );
    scene.add( lightHelper );

    //

    const geometry = new THREE.PlaneGeometry( 100, 100 );
    const material = new THREE.MeshLambertMaterial( { color: 0xbcbcbc } );

    const mesh = new THREE.Mesh( geometry, material );
    mesh.position.set( 0, - 1, 0 );
    mesh.rotation.x = - Math.PI / 2;
    mesh.receiveShadow = true;
    scene.add( mesh );

    //

    // 加载 OBJ 模型
    const mtlLoader= new MTLLoader()
    mtlLoader.load('test12.mtl',(materials) => {
      materials.preload();
      const objLoader = new OBJLoader();
      objLoader.setMaterials(materials);
      objLoader.load('test12.obj', (object) => {
        // 遍历模型子对象
        cube=object;
        // 放大模型 - 直接设置scale
        const scaleFactor = 1; // 放大10倍
        cube.scale.set(scaleFactor, scaleFactor, scaleFactor);
        cube.rotation.y=Math.PI/2;
        cube.position.y=0;
        object.traverse((child) => {
          if (child instanceof THREE.Mesh) {
            // 设置发光材质
            child.material = new THREE.MeshStandardMaterial({
              map: child.material.map || null,
              color: 0xffffff, // 发光颜色
              emissive: 0x880808, // 自发光颜色
              emissiveIntensity: 0.03, // 发光强度
              metalness: 0.1,
              roughness: 0.1,
            });
            child.material.transparent=true;
            child.material.opacity=0.6;
            child.material.side=THREE.DoubleSide;
          }
        });
        scene.add(cube);
      });
    })
    console.log(cube)

    window.addEventListener( 'resize', onWindowResize );

    // GUI

    const gui = new GUI();
    // gui=new GUI();
    // console.log(gui.domElement)
    gui.domElement.style.transform = `scale(${5})`;
    gui.domElement.style.transformOrigin = 'top right';
    const params = {
      map: textures[ 'disturb.jpg' ],
      color: spotLight.color.getHex(),
      intensity: spotLight.intensity,
      distance: spotLight.distance,
      angle: spotLight.angle,
      penumbra: spotLight.penumbra,
      decay: spotLight.decay,
      focus: spotLight.shadow.focus,
      shadows: true
    };

    gui.add( params, 'map', textures ).onChange( function ( val ) {

      spotLight.map = val;

    } );

    gui.addColor( params, 'color' ).onChange( function ( val ) {

      spotLight.color.setHex( val );

    } );

    gui.add( params, 'intensity', 0, 500 ).onChange( function ( val ) {

      spotLight.intensity = val;

    } );


    gui.add( params, 'distance', 0, 20 ).onChange( function ( val ) {

      spotLight.distance = val;

    } );

    gui.add( params, 'angle', 0, Math.PI / 3 ).onChange( function ( val ) {

      spotLight.angle = val;

    } );

    gui.add( params, 'penumbra', 0, 1 ).onChange( function ( val ) {

      spotLight.penumbra = val;

    } );

    gui.add( params, 'decay', 1, 2 ).onChange( function ( val ) {

      spotLight.decay = val;

    } );

    gui.add( params, 'focus', 0, 1 ).onChange( function ( val ) {

      spotLight.shadow.focus = val;

    } );


    gui.add( params, 'shadows' ).onChange( function ( val ) {

      renderer.shadowMap.enabled = val;

      scene.traverse( function ( child ) {

        if ( child.material ) {

          child.material.needsUpdate = true;

        }

      } );

    } );

    gui.open();

  }

  function onWindowResize() {

    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();

    renderer.setSize( window.innerWidth, window.innerHeight );

  }

  function animate() {

    const time = performance.now() / 3000;

    spotLight.position.x = Math.cos( time ) * 2.5;
    spotLight.position.z = Math.sin( time ) * 2.5;

    lightHelper.update();

    renderer.render( scene, camera );

  }

</script>

</body>

</html>
